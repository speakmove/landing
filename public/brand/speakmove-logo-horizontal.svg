<?xml version="1.0" encoding="UTF-8"?>
<!-- SpeakMove · Horizontal lockup (mark + wordmark) -->
<!-- Use for: website headers, email signatures, slide decks, business cards -->
<!-- Note: relies on Inter font being available; convert text to outlines in Figma/Illustrator for guaranteed rendering -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 235 56" width="705" height="168" role="img" aria-label="SpeakMove">
  <title>SpeakMove</title>

  <!-- Mark: green circle + white voice envelope, positioned left -->
  <g transform="translate(4 4)">
    <circle cx="24" cy="24" r="24" fill="#0E6E3B"/>
    <g transform="scale(1.5)" fill="#FFFFFF">
      <rect x="6.25"  y="14"    width="2" height="4"  rx="1" opacity="0.55"/>
      <rect x="9.75"  y="11"    width="2" height="10" rx="1" opacity="0.82"/>
      <rect x="13.25" y="6.5"   width="2" height="19" rx="1"/>
      <rect x="16.75" y="9"     width="2" height="14" rx="1" opacity="0.92"/>
      <rect x="20.25" y="12"    width="2" height="8"  rx="1" opacity="0.78"/>
      <rect x="23.75" y="13.5"  width="2" height="5"  rx="1" opacity="0.55"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text
    x="62"
    y="38"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-weight="800"
    font-size="32"
    letter-spacing="-0.7"
    fill="#0D1A12">Speak<tspan fill="#0E6E3B">Move</tspan></text>
</svg>
